{% extends 'userbase.html' %}

{% block title %}My Profile{% endblock %}

{% set active_page = 'profile' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        {% if updated %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            Your profile has been updated successfully!
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}
        
        <div class="card shadow-sm">
            <div class="card-header bg-eco-green text-white">
                <h4 class="mb-0">My Profile</h4>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='uploads/' + (profile.profile_image if profile.profile_image else 'default_profile.png')) }}"                              
                    alt="Profile Image" class="rounded-circle img-thumbnail" style="width: 150px; height: 150px; object-fit: cover;">
                        <div class="mt-2">
                            <label for="profile_image" class="btn btn-outline-secondary btn-sm">
                                Change Photo
                            </label>
                            <input type="file" id="profile_image" name="profile_image" class="d-none" accept="image/*">
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">Username</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" value="{{ profile.username }}" disabled>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">Email</label>
                        <div class="col-sm-9">
                            <input type="email" class="form-control" value="{{ profile.email }}" disabled>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label">Role</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" value="{{ profile.role|replace('_', ' ')|title }}" disabled>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <label for="full_name" class="col-sm-3 col-form-label">Full Name *</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" id="full_name" name="full_name" 
                                   value="{{ profile.full_name }}" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <label for="home_address" class="col-sm-3 col-form-label">Address *</label>
                        <div class="col-sm-9">
                            <textarea class="form-control" id="home_address" name="home_address" 
                                      rows="2" required>{{ profile.home_address }}</textarea>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <label for="contact_number" class="col-sm-3 col-form-label">Contact *</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" id="contact_number" name="contact_number" 
                                   value="{{ profile.contact_number }}" required>
                        </div>
                    </div>
                    
                    <div class="row mb-4">
                        <label for="environmental_interests" class="col-sm-3 col-form-label">Interests</label>
                        <div class="col-sm-9">
                            <textarea class="form-control" id="environmental_interests" name="environmental_interests" 
                                      rows="2">{{ profile.environmental_interests }}</textarea>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-sm-9 offset-sm-3">
                            <button type="submit" class="btn btn-eco-green">Update Profile</button>
                            <a href="{{ url_for('change_password') }}" class="btn btn-outline-secondary ms-2">Change Password</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('profile_image').addEventListener('change', function(e) {
    if (this.files && this.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            document.querySelector('.rounded-circle').src = e.target.result;
        };
        reader.readAsDataURL(this.files[0]);
    }
});
</script>
{% endblock %}
