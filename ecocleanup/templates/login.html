<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - EcoCleanUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .eco-green { color: #2e7d32; }
        .bg-eco-green { background-color: #2e7d32; }
    </style>
</head>
<body class="bg-light">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>

    <div class="container">
        <div class="row vh-100 align-items-center justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">
                <div class="text-center mb-4">
                    <h1 class="eco-green">EcoCleanUp</h1>
                    <p class="text-muted">Community Cleanup Management</p>
                </div>
                
                <div class="bg-white border rounded-3 shadow-sm">
                    <div class="bg-eco-green text-white text-center p-3 rounded-top">
                        <h2 class="h4 mb-0">Log In</h2>
                    </div>
                    
                    <div class="p-4">
                        <form action="{{ url_for('login') }}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control{% if username_invalid or account_inactive %} is-invalid{% endif %}" 
                                       id="username" name="username" placeholder="Enter your username..." 
                                       maxlength="20" value="{{ username }}" required>
                                {% if username_invalid %}
                                <div class="invalid-feedback">Can't find your account</div>
                                {% elif account_inactive %}
                                <div class="invalid-feedback">Your account is inactive. Please contact admin.</div>
                                {% endif %}
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control{% if password_invalid %} is-invalid{% endif %}" 
                                       id="password" name="password" placeholder="Enter your password..." required>
                                {% if password_invalid %}
                                <div class="invalid-feedback">Incorrect password</div>
                                {% endif %}
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-eco-green">Log In</button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="text-center mt-3">
                    <p class="mb-0">Don't have an account? <a href="{{ url_for('signup') }}" class="eco-green">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
