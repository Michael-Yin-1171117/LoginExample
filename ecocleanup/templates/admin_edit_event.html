{% extends 'userbase.html' %}

{% block title %}Edit Event{% endblock %}

{% set active_page = 'events' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-eco-green text-white">
                <h4 class="mb-0">Edit Event: {{ event.event_name }}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Event Name</label>
                        <input type="text" class="form-control" name="event_name" value="{{ event.event_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" class="form-control" name="location" value="{{ event.location }}" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Date</label>
                            <input type="date" class="form-control" name="event_date" value="{{ event.event_date }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Start Time</label>
                            <input type="time" class="form-control" name="start_time" value="{{ event.start_time }}" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Duration (hours)</label>
                            <input type="number" class="form-control" name="duration" value="{{ event.duration }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Event Type</label>
                            <input type="text" class="form-control" name="event_type" value="{{ event.event_type }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3">{{ event.description }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Supplies</label>
                        <textarea class="form-control" name="supplies" rows="2">{{ event.supplies }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Safety Instructions</label>
                        <textarea class="form-control" name="safety_instructions" rows="2">{{ event.safety_instructions }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin_events') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-eco-green">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
