{% extends 'userbase.html' %}

{% block title %}Submit Feedback{% endblock %}

{% set active_page = 'history' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-eco-green text-white">
                <h4 class="mb-0">Submit Feedback</h4>
            </div>
            <div class="card-body">
                <h5 class="mb-3">{{ event.event_name }}</h5>
                <p class="text-muted">{{ event.event_date }} at {{ event.start_time }}</p>
                
                <form method="post">
                    <div class="mb-4">
                        <label class="form-label">Rating *</label>
                        <div class="rating">
                            {% for i in range(1, 6) %}
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="rating" 
                                       id="star{{ i }}" value="{{ i }}" required>
                                <label class="form-check-label" for="star{{ i }}">{{ i }} star{% if i > 1 %}s{% endif %}</label>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="comments" class="form-label">Comments</label>
                        <textarea class="form-control" id="comments" name="comments" rows="4" 
                                  placeholder="Share your experience..."></textarea>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-eco-green">Submit Feedback</button>
                        <a href="{{ url_for('volunteer_history') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
